<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GOOGLE FONT -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style3.css">
</head>

<body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="search.html">🍳 RecipeGen</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="search.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="favorites.html">Favorites</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- RECIPE DETAILS -->

    <section class="container py-5">
        <div class="details-card">

            <!-- IMAGE -->

            <div class="details-image">
                <img id="recipeImage">
            </div>

            <!-- CONTENT -->

            <div class="details-content">
                <h1 id="recipeName"></h1>
                <p id="recipeCalories"></p>

                <!-- INGREDIENTS -->

                <div class="detail-box">
                    <h3>Ingredients</h3>
                    <ul id="ingredientsList"></ul>
                </div>

                <!-- STEPS -->

                <div class="detail-box">
                    <h3>Cooking Steps</h3>
                    <ol id="stepsList"></ol>
                </div>

                <!-- FAVORITE BUTTON -->

                <button id="favoriteBtn" class="favorite-btn-details">❤️ Add to Favorites</button>
            </div>
        </div>
    </section>

    <!-- TOAST MESSAGE -->

    <div id="toastMessage">Recipe Added ❤️</div>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script3.js"></script>

</body>
</html>
