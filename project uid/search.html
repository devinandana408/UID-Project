<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeGen</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style3.css">
</head>

<body>
    <div class="main-layout">

        <div class="sidebar">

            <h2>🥗 Ingredients</h2>

            <!-- SEARCH -->

            <div class="ingredient-search">
            <input type="text" id="ingredientInput" placeholder="Search or add ingredients...">
            <button onclick="searchByIngredients()">Search</button>
            </div>

            <!-- CATEGORY -->

            <div class="ingredient-group">
                <h4>Vegetables</h4>
                <div class="ingredient-buttons">

                    <button onclick="selectIngredient('Onion')">Onion</button>
                    <button onclick="selectIngredient('Tomato')">Tomato</button>
                    <button onclick="selectIngredient('Carrot')">Carrot</button>
                    <button onclick="selectIngredient('Potato')">Potato</button>
                </div>
            </div>

            <!-- CATEGORY -->

            <div class="ingredient-group">
                <h4>Dairy & Eggs</h4>
                <div class="ingredient-buttons">

                    <button onclick="selectIngredient('Milk')">Milk</button>
                    <button onclick="selectIngredient('Cheese')">Cheese</button>
                    <button onclick="selectIngredient('Butter')">Butter</button>
                    <button onclick="selectIngredient('Egg')">Egg</button>
                </div>
            </div>

            <!-- CATEGORY -->

            <div class="ingredient-group">
                <h4>Meat</h4>
                <div class="ingredient-buttons">

                    <button onclick="selectIngredient('Chicken')">Chicken</button>
                    <button onclick="selectIngredient('Fish')">Fish</button>
                    <button onclick="selectIngredient('Beef')">Beef</button>
                    <button onclick="selectIngredient('Sausage')">Sausage</button>
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="content-area">

            <!-- NAVBAR -->

            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid">
                    <a class="navbar-brand text-white fw-bold" href="#">🍳 RecipeGen</a>

                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="favorites.html">Favorites</a>
                        </li>
                    </ul>
                </div>

            </nav>

            <!-- HERO -->

            <div class="hero-box">
                <div class="hero-overlay"></div>
                <div class="hero-content">
                    <h1>Discover Recipes With Ingredients You Already Have</h1>
                    <p>Smart recipe finder</p>

                    <!-- RECIPE SEARCH -->

                    <div class="search-bar">
                        <input type="text" id="recipeSearch" placeholder="Search Pizza, Burger...">
                        <button onclick="searchRecipe()">Search</button>
                    </div>

                    <!-- BUTTON -->

                    <button class="explore-btn" onclick="showAllRecipes()">Explore Recipes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script3.js"></script>

</body>
</html>
